<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AnyVet - เชื่อมบัญชี LINE</title>
        <script
            charset="utf-8"
            src="https://static.line-scdn.net/liff/edge/2/sdk.js"
        ></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: #f5f5f5;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .container {
                background: #fff;
                border-radius: 16px;
                padding: 32px 24px;
                max-width: 400px;
                width: 90%;
                text-align: center;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            }
            h1 {
                font-size: 20px;
                color: #333;
                margin-bottom: 8px;
            }
            p {
                font-size: 14px;
                color: #888;
                margin-bottom: 24px;
            }
            .status {
                margin-top: 16px;
                padding: 12px;
                border-radius: 8px;
                font-size: 14px;
            }
            .status.error {
                background: #fbe9e7;
                color: #c62828;
            }
            .status.success {
                background: #e8f5e9;
                color: #2e7d32;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>AnyVet</h1>
            <p id="message">กำลังเชื่อมต่อ LINE...</p>
            <div id="status" class="status" style="display: none"></div>
        </div>

        <script>
            const LIFF_ID = "2009505420-rQnlUL2m";
            const API_ENDPOINT = "https://dev-service.anyvets.com/line/link-liff";

            function isTokenExpired(idToken) {
                try {
                    const payload = JSON.parse(atob(idToken.split(".")[1]));
                    const exp = payload.exp * 1000;
                    return Date.now() > exp;
                } catch (e) {
                    return true;
                }
            }

            function showError(msg) {
                document.getElementById("message").textContent =
                    "เกิดข้อผิดพลาด";
                const el = document.getElementById("status");
                el.textContent = msg;
                el.className = "status error";
                el.style.display = "block";
            }

            function showSuccess(msg) {
                document.getElementById("message").textContent = msg;
                const el = document.getElementById("status");
                el.textContent = "เชื่อมบัญชีสำเร็จ";
                el.className = "status success";
                el.style.display = "block";
            }

            async function init() {
                try {
                    await liff.init({ liffId: LIFF_ID });

                    // 🔹 ดึง token จาก query หรือ sessionStorage
                    const urlParams = new URLSearchParams(
                        window.location.search,
                    );
                    let token = urlParams.get("token");

                    if (token) {
                        sessionStorage.setItem("link_line_token", token);
                        window.history.replaceState(
                            {},
                            document.title,
                            window.location.pathname,
                        );
                    } else {
                        token = sessionStorage.getItem("link_line_token");
                    }

                    if (!token) {
                        throw new Error("ไม่พบ token");
                    }

                    // 🔹 login
                    if (!liff.isLoggedIn()) {
                        liff.login();
                        return;
                    }

                    const idToken = liff.getIDToken();

                    if (!idToken || isTokenExpired(idToken)) {
                        liff.logout();
                        liff.login({ redirectUri: window.location.href });
                        return;
                    }

                    const profile = await liff.getProfile();

                    const res = await fetch(API_ENDPOINT, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            token: token,
                            idToken: idToken,
                            lineUserId: profile.userId,
                            displayName: profile.displayName,
                            pictureUrl: profile.pictureUrl || "",
                        }),
                    });

                    if (!res.ok) {
                        const text = await res.text();
                        throw new Error(text || "เชื่อมบัญชีไม่สำเร็จ");
                    }

                    sessionStorage.removeItem("link_line_token");
                    showSuccess("เชื่อมบัญชี LINE สำเร็จ!");

                    // 🔹 ปิด LIFF กลับไปแชท
                    if (liff.isInClient()) {
                        setTimeout(() => liff.closeWindow(), 1500);
                    }
                } catch (err) {
                    showError(err.message);
                }
            }

            init();
        </script>
    </body>
</html>
